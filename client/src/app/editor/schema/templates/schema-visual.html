<ng-container>
  <h4 class="card-title">
    Schema-Übersicht für Datenbank "{{ schemaName | async }}"
  </h4>
  <div style="position: relative;" *ngIf="schemaData.completed">
    <div class="db-schema-drag-drop">
      <sql-table-visual
        *ngFor="let table of project?.schema.tables; let i = index"
        [table]="table"
		[data]="schemaData.tableData[table.name]"
        [readOnly]="false"
      ></sql-table-visual>
    </div>

    <schema-connectors 
		[connectors]="schemaData.connectors"
	></schema-connectors>
  </div>
</ng-container>

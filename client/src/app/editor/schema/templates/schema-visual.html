<ng-container>
  <h4 class="card-title">
    Schema-Übersicht für Datenbank "{{ schemaName | async }}"
  </h4>
  <div style="position: relative;">
    <div class="db-schema-drag-drop">
      <sql-table-visual
        *ngFor="let table of project?.schema.tables"
        [table]="table"
        [readOnly]="false"
      ></sql-table-visual>
    </div>

    <schema-connectors 
		[connectors]="con"
	></schema-connectors>
  </div>
</ng-container>
